<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>נוהל קליטת בית ספר חדש · מעקב משימות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb; --card:#ffffff; --ink:#1e2433; --muted:#6b7280; --line:#e6e9f2;
  --accent:#4f46e5; --accent-soft:#eef0fe;
  --red:#e5484d; --red-soft:#fdecec; --red-line:#f4c7c9;
  --yellow:#d99400; --yellow-soft:#fdf4e0; --yellow-line:#f0dca6;
  --green:#2f9e60; --green-soft:#e8f6ee; --green-line:#bfe6cd;
  --shadow:0 1px 2px rgba(20,25,45,.05),0 8px 24px rgba(20,25,45,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Heebo',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--accent)}

/* ===== top bar ===== */
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-inline-end:auto}
.brand h1{font-size:19px;font-weight:800;margin:0;letter-spacing:-.2px}
.brand .sub{font-size:12.5px;color:var(--muted)}
.who{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 10px;box-shadow:var(--shadow)}
.who label{font-size:12px;color:var(--muted);white-space:nowrap}
.who input{border:none;outline:none;background:transparent;font-weight:600;width:130px}
.sync{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px}
.dot{width:9px;height:9px;border-radius:50%;background:#c9cdd8;flex:none}
.sync.ok .dot{background:var(--green)}
.sync.err .dot{background:var(--red)}
.sync.local .dot{background:var(--yellow)}

/* ===== progress hero ===== */
.hero{max-width:1180px;margin:18px auto 6px;padding:0 20px}
.hero-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 20px;display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.pct{font-size:34px;font-weight:800;line-height:1}
.pct small{font-size:14px;font-weight:600;color:var(--muted)}
.bar{flex:1;min-width:220px}
.bar-track{height:14px;border-radius:999px;background:#eef0f5;overflow:hidden;display:flex}
.bar-track i{display:block;height:100%}
.bar-track .g{background:var(--green)}
.bar-track .y{background:var(--yellow)}
.bar-track .r{background:var(--red-line)}
.legend{display:flex;gap:16px;margin-top:9px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend b{color:var(--ink)}
.chip-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.cd-g{background:var(--green)}.cd-y{background:var(--yellow)}.cd-r{background:var(--red)}

/* ===== toolbar ===== */
.toolbar{max-width:1180px;margin:14px auto;padding:0 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar .grow{flex:1;min-width:200px}
.field{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow);outline:none;width:100%}
select.field{cursor:pointer}
.fbtns{display:flex;gap:6px}
.fbtn{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 13px;cursor:pointer;box-shadow:var(--shadow);font-size:13px;font-weight:600;color:var(--muted);display:inline-flex;gap:6px;align-items:center}
.fbtn[aria-pressed="true"]{color:var(--ink);border-color:transparent}
.fbtn.r[aria-pressed="true"]{background:var(--red-soft);color:var(--red);border-color:var(--red-line)}
.fbtn.y[aria-pressed="true"]{background:var(--yellow-soft);color:var(--yellow);border-color:var(--yellow-line)}
.fbtn.g[aria-pressed="true"]{background:var(--green-soft);color:var(--green);border-color:var(--green-line)}
.fbtn.all[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.ghost{background:transparent;border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
.ghost:hover{color:var(--ink)}

/* ===== sections ===== */
.wrap{max-width:1180px;margin:0 auto 60px;padding:0 20px}
.section{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.sec-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.sec-head:hover{background:#fafbff}
.caret{transition:transform .18s;color:var(--muted);flex:none}
.section.collapsed .caret{transform:rotate(-90deg)}
.sec-title{font-weight:700;font-size:15.5px;flex:1;min-width:0}
.sec-count{font-size:12.5px;color:var(--muted);white-space:nowrap}
.mini{width:120px;height:8px;border-radius:999px;background:#eef0f5;overflow:hidden;display:flex;flex:none}
.mini i{height:100%}.mini .g{background:var(--green)}.mini .y{background:var(--yellow)}.mini .r{background:var(--red-line)}
.sec-body{border-top:1px solid var(--line)}
.section.collapsed .sec-body{display:none}
.subhead{padding:10px 18px;background:#f7f8fc;font-size:12.5px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--line)}

/* ===== task row ===== */
.task{display:grid;grid-template-columns:186px 1fr 320px;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);align-items:start}
.task:last-child{border-bottom:none}
.task.st-todo{background:linear-gradient(90deg,var(--red-soft),transparent 60%)}
.task.st-doing{background:linear-gradient(90deg,var(--yellow-soft),transparent 60%)}
.task.st-done{background:linear-gradient(90deg,var(--green-soft),transparent 60%)}
.status-col{display:flex;flex-direction:column;gap:6px}
.sbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:13px;font-weight:700;text-align:right;display:flex;align-items:center;gap:8px;transition:.12s}
.sbtn .b{width:12px;height:12px;border-radius:4px;flex:none;border:1px solid rgba(0,0,0,.08)}
.sbtn.r .b{background:var(--red)}.sbtn.y .b{background:var(--yellow)}.sbtn.g .b{background:var(--green)}
.sbtn:hover{border-color:#c9cdd8}
.sbtn.on.r{background:var(--red-soft);border-color:var(--red-line);color:var(--red)}
.sbtn.on.y{background:var(--yellow-soft);border-color:var(--yellow-line);color:var(--yellow)}
.sbtn.on.g{background:var(--green-soft);border-color:var(--green-line);color:var(--green)}
.body-col{min-width:0}
.t-title{font-weight:600;font-size:14.5px}
.num-badge{display:inline-block;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:12px;border-radius:7px;padding:1px 8px;margin-inline-end:7px}
.details{margin-top:6px;font-size:13px;color:#3d4456;white-space:pre-wrap;border-inline-start:2px solid var(--line);padding-inline-start:10px}
.details.hidden{display:none}
.moreBtn{margin-top:6px;background:none;border:none;color:var(--accent);cursor:pointer;font-size:12.5px;font-weight:600;padding:0}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.meta .m{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#48506a;background:#f3f5fb;border:1px solid var(--line);border-radius:8px;padding:3px 8px;max-width:100%}
.meta .m b{color:var(--muted);font-weight:600}
.notes-col{display:flex;flex-direction:column;gap:5px}
.notes-col textarea{width:100%;min-height:64px;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff;outline:none;line-height:1.45}
.notes-col textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.stamp{font-size:11.5px;color:var(--muted);min-height:15px}
.stamp b{color:#48506a;font-weight:600}

.empty{max-width:1180px;margin:40px auto;padding:0 20px;text-align:center;color:var(--muted)}

/* ===== setup / modal ===== */
.overlay{position:fixed;inset:0;background:rgba(20,25,45,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:18px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
.modal-in{padding:26px 28px}
.modal h2{margin:0 0 4px;font-size:20px}
.modal p{color:var(--muted);margin:.4em 0}
.modal ol{padding-inline-start:20px;color:#3d4456}
.modal code,pre{font-family:'SFMono-Regular',Consolas,monospace;direction:ltr;text-align:left}
pre{background:#0f1222;color:#e6e9f5;padding:14px;border-radius:12px;overflow:auto;font-size:12px;position:relative}
.copy{position:absolute;top:8px;left:8px;background:#2a2f47;color:#fff;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px}
.modal label{display:block;font-weight:600;margin:12px 0 4px;font-size:13px}
.modal .field{box-shadow:none}
.row-btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.link-out{background:#f3f5fb;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:12px;font-size:12px;word-break:break-all;direction:ltr;text-align:left}
.note-box{background:var(--yellow-soft);border:1px solid var(--yellow-line);border-radius:10px;padding:10px 12px;font-size:12.5px;color:#7a5a00;margin-top:10px}

@media(max-width:820px){
  .task{grid-template-columns:1fr;gap:10px}
  .status-col{flex-direction:row;flex-wrap:wrap}
  .sbtn{flex:1}
  .notes-col textarea{min-height:52px}
}
@media print{
  .topbar,.toolbar,.moreBtn,.copy{display:none!important}
  .details.hidden{display:block!important}
  body{background:#fff}
  .section,.hero-card{box-shadow:none;border-color:#ccc}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <h1>נוהל קליטת בית ספר חדש · מעקב משימות</h1>
      <div class="sub">רשת אורט · לוח מעקב משותף · כל אחד מעדכן את הסטטוס וההערות של המשימות שלו</div>
    </div>
    <div class="who">
      <label>אני:</label>
      <input id="who" placeholder="השם שלך" autocomplete="name">
    </div>
    <div class="sync" id="sync"><span class="dot"></span><span id="syncTxt">מתחבר…</span></div>
    <button class="ghost" id="settingsBtn" title="העתקת קישור לשיתוף">🔗</button>
  </div>
</div>

<div class="hero">
  <div class="hero-card">
    <div><div class="pct" id="pctBig">0<small>%</small></div><div style="font-size:12.5px;color:var(--muted);margin-top:2px">הושלמו</div></div>
    <div class="bar">
      <div class="bar-track"><i class="g" id="pbG"></i><i class="y" id="pbY"></i><i class="r" id="pbR"></i></div>
      <div class="legend">
        <span><i class="chip-dot cd-g"></i>הושלם <b id="cG">0</b></span>
        <span><i class="chip-dot cd-y"></i>בביצוע <b id="cY">0</b></span>
        <span><i class="chip-dot cd-r"></i>טרם התחיל <b id="cR">0</b></span>
        <span>· סה״כ <b id="cT">0</b> משימות ב־<b id="cSec">0</b> תחומים</span>
      </div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="grow"><input class="field" id="q" placeholder="🔎 חיפוש חופשי במשימות, בעלי אחריות, הערות…"></div>
  <select class="field" id="fSection" style="max-width:260px"><option value="">כל התחומים</option></select>
  <select class="field" id="fResp" style="max-width:220px"><option value="">כל בעלי האחריות</option></select>
  <div class="fbtns">
    <button class="fbtn all" data-st="" aria-pressed="true">הכל</button>
    <button class="fbtn r" data-st="todo" aria-pressed="false"><i class="chip-dot cd-r"></i>טרם</button>
    <button class="fbtn y" data-st="doing" aria-pressed="false"><i class="chip-dot cd-y"></i>בביצוע</button>
    <button class="fbtn g" data-st="done" aria-pressed="false"><i class="chip-dot cd-g"></i>הושלם</button>
  </div>
  <button class="ghost" id="toggleAll">כווץ הכל</button>
  <button class="ghost" id="printBtn">🖨︎ הדפסה / PDF</button>
</div>

<div class="wrap" id="wrap"></div>
<div class="empty" id="empty" style="display:none">לא נמצאו משימות התואמות לסינון.</div>

<div id="setupHost"></div>

/* ---------- config resolution ---------- */
function decodeCfg(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s)))); }catch(e){ return null; } }
function encodeCfg(o){ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))); }
function loadConfig(){
  if(BAKED.webapp && BAKED.key) return {webapp:BAKED.webapp,key:BAKED.key,source:"baked"};
  const h = location.hash.match(/cfg=([^&]+)/);
  if(h){ const c=decodeCfg(h[1]); if(c&&c.webapp&&c.key){ localStorage.setItem(LS_CFG,JSON.stringify(c)); return {...c,source:"hash"}; } }
  const ls = localStorage.getItem(LS_CFG);
  if(ls){ try{ const c=JSON.parse(ls); if(c.webapp&&c.key) return {...c,source:"ls"}; }catch(e){} }
  return null;
}
/* decrypt the embedded task definitions using the key from the team link */
async function decryptTasks(keyB64){
  const raw=Uint8Array.from(atob(keyB64),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey("raw",raw,{name:"AES-GCM"},false,["decrypt"]);
  const iv=Uint8Array.from(atob(ENC.iv),c=>c.charCodeAt(0));
  const data=Uint8Array.from(atob(ENC.ct),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return JSON.parse(new TextDecoder("utf-8").decode(pt));
}
function shareLink(){
  const base=location.origin+location.pathname;
  return base+"#cfg="+encodeCfg({webapp:CFG.webapp,key:CFG.key});
}
let CFG = loadConfig();

/* ---------- state ---------- */
let STATE = {};
try{ STATE = JSON.parse(localStorage.getItem(LS_STATE)||"{}"); }catch(e){ STATE={}; }
function saveLocal(){ localStorage.setItem(LS_STATE, JSON.stringify(STATE)); }
function rec(id){ return STATE[id] || (STATE[id]={status:null,notes:"",updated_by:"",updated_at:null}); }
function effStatus(t){ const r=STATE[t.id]; return (r&&r.status) ? r.status : t.default_status; }
function effNotes(t){ const r=STATE[t.id]; return (r&&typeof r.notes==="string") ? r.notes : (t.seed_note||""); }

/* ---------- google sheets (apps script web app) ---------- */
async function cloudFetch(){
  if(!CFG||CFG.local) return null;
  const r = await fetch(CFG.webapp+"?action=list&t="+Date.now());
  if(!r.ok) throw new Error("GET "+r.status);
  const j = await r.json();
  return j.rows || [];
}
let pushQueue={};
let pushTimer=null;
function queuePush(id){
  if(!CFG||CFG.local) return;
  pushQueue[id]=true;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(flushPush,700);
}
async function flushPush(){
  const ids=Object.keys(pushQueue); pushQueue={};
  if(!ids.length||!CFG||CFG.local) return;
  const rows=ids.map(id=>{ const r=rec(id); return {task_id:id,status:r.status,notes:r.notes,updated_by:r.updated_by,updated_at:r.updated_at}; });
  try{
    // text/plain => simple request, avoids CORS preflight to Apps Script
    const res=await fetch(CFG.webapp,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({rows})});
    if(!res.ok) throw new Error("POST "+res.status);
    setSync("ok");
  }catch(e){ console.error(e); setSync("err"); ids.forEach(id=>pushQueue[id]=true); }
}

/* ---------- merge cloud → local ---------- */
function mergeCloud(rows){
  let changed=false;
  const editing = document.activeElement && document.activeElement.dataset && document.activeElement.dataset.notesFor;
  rows.forEach(row=>{
    const id=row.task_id; const loc=STATE[id];
    const cloudT = row.updated_at ? Date.parse(row.updated_at) : 0;
    const locT = loc&&loc.updated_at ? Date.parse(loc.updated_at) : 0;
    if(!loc || cloudT>locT){
      if(id===editing) return; // don't clobber a note being typed
      STATE[id]={status:row.status,notes:row.notes||"",updated_by:row.updated_by||"",updated_at:row.updated_at};
      changed=true;
    }
  });
  if(changed){ saveLocal(); render(); }
}

/* ---------- sync indicator ---------- */
function setSync(kind){
  const el=document.getElementById("sync"); const t=document.getElementById("syncTxt");
  el.className="sync "+(kind==="ok"?"ok":kind==="err"?"err":kind==="local"?"local":"");
  t.textContent = kind==="ok"?("מסונכרן · "+timeNow()) : kind==="err"?"שגיאת סנכרון — מנסה שוב" : kind==="local"?"מצב מקומי (ללא ענן)" : "מתחבר…";
}
function timeNow(){ const d=new Date(); return d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}); }
function fmtStamp(r){
  if(!r||!r.updated_at) return "";
  const d=new Date(r.updated_at);
  const day=d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit"});
  const tm=d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
  return (r.updated_by?("<b>"+esc(r.updated_by)+"</b> · "):"")+day+" "+tm;
}

/* ---------- helpers ---------- */
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const STLABEL={todo:"טרם התחיל",doing:"בביצוע",done:"הושלם"};

/* ---------- filters ---------- */
let filter={q:"",section:"",resp:"",status:""};
const collapsed=new Set();

/* ---------- render ---------- */
function sectionsOrder(){
  const seen=[]; TASKS.forEach(t=>{ if(!seen.includes(t.section)) seen.push(t.section); }); return seen;
}
function matches(t){
  const st=effStatus(t);
  if(filter.status && st!==filter.status) return false;
  if(filter.section && t.section!==filter.section) return false;
  if(filter.resp && !(t.responsible||"").includes(filter.resp)) return false;
  if(filter.q){
    const hay=(t.num+" "+t.action+" "+t.participants+" "+t.responsible+" "+t.timeline+" "+effNotes(t)+" "+t.section+" "+t.subsection).toLowerCase();
    if(!hay.includes(filter.q.toLowerCase())) return false;
  }
  return true;
}
function render(){
  const wrap=document.getElementById("wrap"); wrap.innerHTML="";
  let shown=0;
  sectionsOrder().forEach(sec=>{
    const items=TASKS.filter(t=>t.section===sec && matches(t));
    if(!items.length) return;
    shown+=items.length;
    const all=TASKS.filter(t=>t.section===sec);
    const g=all.filter(t=>effStatus(t)==="done").length;
    const y=all.filter(t=>effStatus(t)==="doing").length;
    const r=all.filter(t=>effStatus(t)==="todo").length; const tot=all.length;
    const sd=document.createElement("div");
    sd.className="section"+(collapsed.has(sec)?" collapsed":"");
    sd.innerHTML=`<div class="sec-head">
        <span class="caret">▾</span>
        <span class="sec-title">${esc(sec)}</span>
        <span class="mini"><i class="g" style="width:${pc(g,tot)}%"></i><i class="y" style="width:${pc(y,tot)}%"></i><i class="r" style="width:${pc(r,tot)}%"></i></span>
        <span class="sec-count">${g}/${tot} הושלמו</span>
      </div><div class="sec-body"></div>`;
    sd.querySelector(".sec-head").onclick=()=>{ if(collapsed.has(sec))collapsed.delete(sec);else collapsed.add(sec); render(); };
    const body=sd.querySelector(".sec-body");
    let curSub=null;
    items.forEach(t=>{
      if(t.subsection && t.subsection!==curSub){ curSub=t.subsection; const sh=document.createElement("div"); sh.className="subhead"; sh.textContent=t.subsection; body.appendChild(sh); }
      if(!t.subsection) curSub=null;
      body.appendChild(taskEl(t));
    });
    wrap.appendChild(sd);
  });
  document.getElementById("empty").style.display = shown? "none":"block";
  updateHero();
}
function pc(n,d){ return d? Math.round(n/d*100):0; }

function taskEl(t){
  const st=effStatus(t); const notes=effNotes(t); const r=STATE[t.id];
  const el=document.createElement("div"); el.className="task st-"+st;
  const lines=(t.action||"").split("\n");
  const title=lines[0]||"";
  const rest=lines.slice(1).join("\n").trim();
  const meta=[];
  if(t.participants) meta.push(`<span class="m"><b>👥</b> ${esc(t.participants.replace(/\n/g,", "))}</span>`);
  if(t.responsible) meta.push(`<span class="m"><b>🧭 באחריות:</b> ${esc(t.responsible.replace(/\n/g,", "))}</span>`);
  if(t.timeline) meta.push(`<span class="m"><b>⏱</b> ${esc(t.timeline.replace(/\n/g," "))}</span>`);
  el.innerHTML=`
    <div class="status-col">
      ${sbtn(t.id,"done","g",st)}
      ${sbtn(t.id,"doing","y",st)}
      ${sbtn(t.id,"todo","r",st)}
    </div>
    <div class="body-col">
      <div class="t-title">${t.num?`<span class="num-badge">${esc(t.num)}</span>`:""}${esc(title)}</div>
      ${rest?`<div class="details hidden">${esc(rest)}</div><button class="moreBtn">פרטים ▾</button>`:""}
      <div class="meta">${meta.join("")}</div>
    </div>
    <div class="notes-col">
      <textarea data-notes-for="${t.id}" placeholder="הערות / עדכון סטטוס חופשי…">${esc(notes)}</textarea>
      <div class="stamp">${fmtStamp(r)}</div>
    </div>`;
  // status buttons
  el.querySelectorAll(".sbtn").forEach(b=>{ b.onclick=()=>setStatus(t,b.dataset.st); });
  // details toggle
  const mb=el.querySelector(".moreBtn");
  if(mb){ mb.onclick=()=>{ const d=el.querySelector(".details"); d.classList.toggle("hidden"); mb.textContent=d.classList.contains("hidden")?"פרטים ▾":"הסתר ▴"; }; }
  // notes
  const ta=el.querySelector("textarea");
  ta.addEventListener("input",()=>{ onNoteInput(t,ta.value); });
  return el;
}
function sbtn(id,st,cls,cur){ return `<button class="sbtn ${cls} ${cur===st?"on":""}" data-st="${st}">${st===cur?"● ":""}${STLABEL[st]}</button>`; }

function stampNow(t){ const r=rec(t.id); r.updated_by=(document.getElementById("who").value||"").trim(); r.updated_at=new Date().toISOString(); }
function setStatus(t,st){
  const r=rec(t.id); r.status=st;
  if(typeof r.notes!=="string"||r.notes==="") r.notes=effNotes(t);
  stampNow(t); saveLocal(); queuePush(t.id); render();
}
let noteTimer={};
function onNoteInput(t,val){
  const r=rec(t.id); r.notes=val;
  if(!r.status) r.status=effStatus(t);
  stampNow(t); saveLocal();
  clearTimeout(noteTimer[t.id]);
  noteTimer[t.id]=setTimeout(()=>{ queuePush(t.id); const stEl=[...document.querySelectorAll(`[data-notes-for="${t.id}"]`)][0]; if(stEl){ const s=stEl.closest(".notes-col").querySelector(".stamp"); if(s)s.innerHTML=fmtStamp(r);} },500);
}

function updateHero(){
  const g=TASKS.filter(t=>effStatus(t)==="done").length;
  const y=TASKS.filter(t=>effStatus(t)==="doing").length;
  const r=TASKS.filter(t=>effStatus(t)==="todo").length; const tot=TASKS.length;
  document.getElementById("pctBig").innerHTML=pc(g,tot)+"<small>%</small>";
  document.getElementById("pbG").style.width=pc(g,tot)+"%";
  document.getElementById("pbY").style.width=pc(y,tot)+"%";
  document.getElementById("pbR").style.width=pc(r,tot)+"%";
  document.getElementById("cG").textContent=g;
  document.getElementById("cY").textContent=y;
  document.getElementById("cR").textContent=r;
  document.getElementById("cT").textContent=tot;
  document.getElementById("cSec").textContent=sectionsOrder().length;
}

/* ---------- toolbar: build filter dropdowns from TASKS (idempotent) ---------- */
function buildFilters(){
  const secSel=document.getElementById("fSection");
  secSel.querySelectorAll("option:not(:first-child)").forEach(o=>o.remove());
  sectionsOrder().forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=s.length>50?s.slice(0,50)+"…":s; secSel.appendChild(o); });
  const rSel=document.getElementById("fResp");
  rSel.querySelectorAll("option:not(:first-child)").forEach(o=>o.remove());
  [...new Set(TASKS.map(t=>(t.responsible||"").split("\n")[0].trim()).filter(Boolean))].sort()
    .forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=s; rSel.appendChild(o); });
}
/* ---------- toolbar wiring (once) ---------- */
function initToolbar(){
  document.getElementById("q").addEventListener("input",e=>{ filter.q=e.target.value; render(); });
  document.getElementById("fSection").addEventListener("change",e=>{ filter.section=e.target.value; render(); });
  document.getElementById("fResp").addEventListener("change",e=>{ filter.resp=e.target.value; render(); });
  document.querySelectorAll(".fbtn").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".fbtn").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true"); filter.status=b.dataset.st; render();
  }));
  document.getElementById("toggleAll").addEventListener("click",e=>{
    if(collapsed.size){ collapsed.clear(); e.target.textContent="כווץ הכל"; }
    else { sectionsOrder().forEach(s=>collapsed.add(s)); e.target.textContent="הרחב הכל"; }
    render();
  });
  document.getElementById("printBtn").addEventListener("click",()=>window.print());
  const who=document.getElementById("who");
  who.value=localStorage.getItem(LS_WHO)||"";
  who.addEventListener("input",()=>localStorage.setItem(LS_WHO,who.value));
  document.getElementById("settingsBtn").addEventListener("click",()=>{
    if(!CFG){ alert("פתחי את הכלי דרך הקישור שקיבלת בצוות."); return; }
    navigator.clipboard.writeText(shareLink()).then(()=>alert("🔗 הקישור לשיתוף הועתק — אפשר לשלוח לצוות."));
  });
}

/* ---------- need-link screen (public shell) ---------- */
function showNeedLink(msg){
  const host=document.getElementById("setupHost");
  host.innerHTML=`<div class="overlay"><div class="modal"><div class="modal-in" style="text-align:center">
    <div style="font-size:44px;line-height:1">🔗</div>
    <h2>נדרש קישור צוות</h2>
    <p>${esc(msg||"הלוח נפתח דרך קישור אישי שנשלח לצוות הקליטה. אין לך קישור? פני למי ששיתפ/ה אותו איתך.")}</p>
  </div></div></div>`;
}

/* ---------- boot ---------- */
let pollTimer=null;
async function boot(){
  if(!CFG || !CFG.webapp || !CFG.key){ showNeedLink(); return; }
  setSync("");
  // decrypt the task definitions from the embedded blob using the key carried in the team link
  try{
    TASKS = await decryptTasks(CFG.key);
  }catch(e){ console.error(e); showNeedLink("הקישור אינו תקין. פתחי את הלוח דרך הקישור המלא שקיבלת בצוות."); return; }
  buildFilters();
  render();
  // load statuses from the sheet
  try{ const rows=await cloudFetch(); if(rows) mergeCloud(rows); setSync("ok"); }
  catch(e){ console.error(e); setSync("err"); }
  render();
  clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    try{ const rows=await cloudFetch(); if(rows){ mergeCloud(rows); setSync("ok"); } }
    catch(e){ setSync("err"); }
  },15000);
}

initToolbar();
boot();
</script>
